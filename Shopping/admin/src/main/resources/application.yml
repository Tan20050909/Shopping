server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:Shopping}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: ShoppingAdminPlatformSecretKey2026VeryLongSecretForHS256Algorithm
  expiration: 86400000

file:
  upload-path: ./uploads
  access-path: /uploads

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 50MB

# AI助手配置（硅基流动 OpenAI 兼容接口，可使用免费开源模型）
# 说明：不能硬编码真实密钥。到 https://cloud.siliconflow.cn 获取API Key后填入 api-key，并把 enabled 改为 true。
ai:
  llm:
    api-url: https://api.siliconflow.cn/v1/chat/completions
    api-key: sk-your-siliconflow-api-key
    model: Qwen/Qwen2.5-7B-Instruct
    max-tokens: 1024
    temperature: 0.7
    enabled: false  # true=启用真实大模型；false=使用本地规则引擎

logging:
  level:
    com.shopping.admin: debug
